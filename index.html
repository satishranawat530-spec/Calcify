<!DOCTYPE html>
<html lang="en">
<head><meta name="google-site-verification" content="UR3CHXGSQ62HLHqjrHZlFpMe8SDUhj7GeD2iHyEbBuc" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Calc Elite Edition</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #ff9f0a;
            --icon-stroke: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100vh; width: 100vw; overflow: hidden; color: var(--text-color); }

        .calculator { background: var(--bg-color); background-size: cover; background-position: center; width: 100%; height: 100%; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; position: relative; }

        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; padding: 10px 0; z-index: 10; align-items: center; }

        .icon-btn svg {
            fill: none;
            stroke: var(--icon-stroke);
            stroke-width: 2.5;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:active svg { transform: rotate(45deg) scale(0.9); }

        /* DISPLAY AREA */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px 0;
            overflow: hidden;
            text-align: right;
        }

        #display {
            width: 85%;
            margin-left: auto;
            font-size: 60px;
            font-weight: 200;
            word-wrap: break-word;
            word-break: break-all;
            line-height: 1.1;
            transition: font-size 0.1s ease;
        }

        #live-result {
            font-size: 26px;
            color: #777;
            margin-top: 8px;
            min-height: 35px;
            font-weight: 300;
        }

        /* BUTTONS */
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding-bottom: 20px; }

        .grid-btn {
            height: 75px;
            width: 75px;
            border: none;
            border-radius: 50%;
            background: #2c2c2e;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        .grid-btn:active {
            transform: scale(0.90);
            background: #555;
        }

        .orange { background: var(--accent-color) !important; }
        .red { background: #ff453a !important; }
        .green { background: #32d74b !important; color: #000; font-weight: bold; }

        /* OVERLAYS */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 100; display: none; flex-direction: column; padding: 40px 25px; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .o-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .done-btn { color: var(--accent-color); font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="calculator" id="mainCalc">
    <div class="top-bar">
        <div class="icon-btn" onclick="openOverlay('historyPage')">
            <svg width="34" height="34" viewBox="0 0 24 24">
                <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"/>
            </svg>
        </div>

        <!-- FIXED SETTINGS ICON -->
        <div class="icon-btn" onclick="openOverlay('settingsPage')">
            <svg width="34" height="34" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8a4 4 0 100 8 4 4 0 000-8zm7 4a7 7 0 01-.14 1.38l2.11 1.65-2 3.46-2.49-1a7.07 7.07 0 01-2.38 1.38l-.38 2.65h-4l-.38-2.65a7.07 7.07 0 01-2.38-1.38l-2.49 1-2-3.46 2.11-1.65A7 7 0 015 12c0-.47.05-.93.14-1.38L3.03 8.97l2-3.46 2.49 1a7.07 7.07 0 012.38-1.38l.38-2.65h4l.38 2.65a7.07 7.07 0 012.38 1.38l2.49-1 2 3.46-2.11 1.65c.09.45.14.91.14 1.38z"/>
            </svg>
        </div>
    </div>

    <div class="display-container">
        <div id="display">0</div>
        <div id="live-result"></div>
    </div>

    <div class="buttons">
        <button class="grid-btn red" onclick="clearDisp()">AC</button>
        <button class="grid-btn orange" onclick="plusMinus()">+/-</button>
        <button class="grid-btn orange" onclick="percent()">%</button>
        <button class="grid-btn orange" onclick="addOp('÷')">÷</button>
        <button class="grid-btn" onclick="delLast()">⌫</button>
        <button class="grid-btn" onclick="addN('8')">8</button>
        <button class="grid-btn" onclick="addN('9')">9</button>
        <button class="grid-btn orange" onclick="addOp('×')">×</button>
        <button class="grid-btn" onclick="addN('7')">7</button>
        <button class="grid-btn" onclick="addN('5')">5</button>
        <button class="grid-btn" onclick="addN('6')">6</button>
        <button class="grid-btn orange" onclick="addOp('-')">-</button>
        <button class="grid-btn" onclick="addN('4')">4</button>
        <button class="grid-btn" onclick="addN('2')">2</button>
        <button class="grid-btn" onclick="addN('3')">3</button>
        <button class="grid-btn orange" onclick="addOp('+')">+</button>
        <button class="grid-btn" onclick="addN('1')">1</button>
        <button class="grid-btn" onclick="addN('0')">0</button>
        <button class="grid-btn" onclick="addN('.')">.</button>
        <button class="grid-btn green" onclick="calculate()">=</button>
    </div>

    <div class="overlay" id="settingsPage">
        <div class="o-header"><h2>Settings</h2><span class="done-btn" onclick="closeOverlay('settingsPage')">Done</span></div>
        <div onclick="toggleTheme()" style="padding:18px; background:var(--card-bg); border-radius:15px; margin-bottom:15px; cursor:pointer;">🌓 Switch Dark/Light</div>
        <div onclick="document.getElementById('bgIn').click()" style="padding:18px; background:var(--card-bg); border-radius:15px; cursor:pointer;">🖼️ Custom Wallpaper</div>
        <input type="file" id="bgIn" hidden accept="image/*" onchange="setBg(this)">
    </div>

    <div class="overlay" id="historyPage">
        <div class="o-header"><h3>History</h3><span class="done-btn" onclick="closeOverlay('historyPage')">Done</span></div>
        <div id="histList"></div>
    </div>
</div>

<script>
    const disp = document.getElementById("display");
    const live = document.getElementById("live-result");
    let isD = true;

    document.querySelectorAll('.grid-btn').forEach(btn => {
        btn.addEventListener('touchstart', () => {}, {passive: true});
    });

    function addN(n) {
        let val = disp.innerText;
        let parts = val.split(/[\+\-×÷]/);
        let last = parts[parts.length - 1];

        if (last.length >= 13 && n !== '.') return;
        if (n === '.' && last.includes('.')) return;

        disp.innerText = (disp.innerText === "0" && n !== ".") ? n : disp.innerText + n;
        updateUI();
    }

    function addOp(op) {
        let last = disp.innerText.slice(-1);
        if ("+-×÷".includes(last)) disp.innerText = disp.innerText.slice(0,-1) + op;
        else disp.innerText += op;
        updateUI();
    }

    function updateUI() {
        let len = disp.innerText.length;
        disp.style.fontSize = len > 35 ? "28px" : len > 18 ? "45px" : "60px";

        try {
            let clean = disp.innerText.replace(/×/g, "*").replace(/÷/g, "/");
            if (!"+-*/".includes(clean.slice(-1))) {
                let res = eval(clean);
                live.innerText = "= " + (res.toString().length > 12 ? res.toPrecision(7) : res);
            }
        } catch { live.innerText = ""; }
    }

    function calculate() {
        if (live.innerText !== "") {
            let res = live.innerText.replace("= ", "");
            saveHist(disp.innerText, res);
            disp.innerText = res;
            live.innerText = "";
            updateUI();
        }
    }

    function saveHist(e, r) {
        const d = document.createElement("div");
        d.innerHTML = `<p style="color:#666; font-size:14px;">${e}</p><p style="font-size:20px; border-bottom:1px solid #444; margin-bottom:12px; padding-bottom:5px;">= ${r}</p>`;
        document.getElementById("histList").prepend(d);
    }

    function clearDisp() { disp.innerText = "0"; live.innerText = ""; updateUI(); }
    function delLast() { disp.innerText = disp.innerText.slice(0, -1) || "0"; updateUI(); }
    function openOverlay(id) { document.getElementById(id).style.display = "flex"; }
    function closeOverlay(id) { document.getElementById(id).style.display = "none"; }

    function toggleTheme() {
        isD = !isD;
        const r = document.documentElement;
        r.style.setProperty('--bg-color', isD ? "#0f0f11" : "#fff");
        r.style.setProperty('--text-color', isD ? "#fff" : "#000");
        r.style.setProperty('--icon-stroke', isD ? "#fff" : "#000");
        r.style.setProperty('--card-bg', isD ? "#1c1c1e" : "#f0f0f5");
    }

    function setBg(i) {
        const fr = new FileReader();
        fr.onload = (e) => document.getElementById('mainCalc').style.backgroundImage = `url(${e.target.result})`;
        fr.readAsDataURL(i.files[0]);
    }
</script>
</body>
</html>
